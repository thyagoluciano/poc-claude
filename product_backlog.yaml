product:
  name: "TaskFlow API"
  description: "API REST de gerenciamento de tarefas — construída autonomamente por uma squad híbrida"

tasks:
  # ============================================================
  # WAVE 1 — Sem dependências (3 tasks em paralelo)
  # ============================================================

  - id: task-01-models
    title: "Modelos Pydantic e Schemas"
    description: |
      Criar os schemas Pydantic para a TaskFlow API.

      ## O que criar

      1. `backend/src/taskflow/schemas.py` — Schemas Pydantic:
         - `TaskBase(BaseModel)`: title (str, min 1, max 200), description (str | None), priority (Literal["low","medium","high"], default "medium")
         - `TaskCreate(TaskBase)`: usado para criação
         - `TaskUpdate(BaseModel)`: todos os campos opcionais + status (Literal["todo","in_progress","done"] | None)
         - `TaskResponse(TaskBase)`: id (int), status (str), created_at (datetime), updated_at (datetime | None), owner_id (int)
         - `UserBase(BaseModel)`: username (str, min 3, max 50), email (EmailStr)
         - `UserCreate(UserBase)`: password (str, min 8)
         - `UserResponse(UserBase)`: id (int), created_at (datetime)

      2. `backend/tests/test_schemas.py` — Testes unitários:
         - Testar criação válida de TaskCreate e UserCreate
         - Testar validações (título vazio, senha curta, email inválido)
         - Testar TaskUpdate com campos parciais

      ## Nota
      - O `backend/pyproject.toml` e `backend/src/taskflow/__init__.py` já foram criados no setup do repo (etapa-01).
    dependencies: []
    acceptance_criteria:
      - "Schemas Pydantic criados em backend/src/taskflow/schemas.py"
      - "Validações funcionando (min/max length, email, etc)"
      - "Testes em backend/tests/test_schemas.py passando"
    files_to_create:
      - "backend/src/taskflow/schemas.py"
      - "backend/tests/test_schemas.py"

  - id: task-02-database
    title: "Setup do Banco de Dados"
    description: |
      Configurar SQLAlchemy com SQLite para a TaskFlow API.

      ## O que criar

      1. `backend/src/taskflow/database.py` — Configuração do banco:
         - Engine SQLite: `sqlite:///./taskflow.db`
         - SessionLocal com autocommit=False, autoflush=False
         - Base = declarative_base()
         - Função `get_db()` que retorna session como dependency do FastAPI (yield pattern)
         - Função `create_tables()` que cria todas as tabelas

      2. `backend/src/taskflow/db_models.py` — Modelos SQLAlchemy:
         - `UserModel(Base)`: table "users"
           - id: Integer, primary_key, autoincrement
           - username: String(50), unique, index
           - email: String(100), unique
           - hashed_password: String(255)
           - created_at: DateTime, default=utcnow
           - tasks: relationship("TaskModel", back_populates="owner")
         - `TaskModel(Base)`: table "tasks"
           - id: Integer, primary_key, autoincrement
           - title: String(200)
           - description: Text, nullable
           - priority: String(10), default="medium"
           - status: String(20), default="todo"
           - created_at: DateTime, default=utcnow
           - updated_at: DateTime, nullable, onupdate=utcnow
           - owner_id: Integer, ForeignKey("users.id")
           - owner: relationship("UserModel", back_populates="tasks")

      3. `backend/tests/test_database.py` — Testes:
         - Testar criação de tabelas
         - Testar inserção de User e Task
         - Testar relacionamento User <-> Tasks

      ## Nota
      - O `backend/pyproject.toml` e `backend/src/taskflow/__init__.py` já foram criados no setup do repo (etapa-01).
    dependencies: []
    acceptance_criteria:
      - "SQLAlchemy configurado com SQLite"
      - "Modelos User e Task criados"
      - "Relacionamento User-Tasks funcionando"
      - "Testes passando"
    files_to_create:
      - "backend/src/taskflow/database.py"
      - "backend/src/taskflow/db_models.py"
      - "backend/tests/test_database.py"

  - id: task-07-nextjs-setup
    title: "Next.js Setup + Layout Base"
    description: |
      Criar o projeto Next.js com TypeScript, Tailwind CSS, App Router, layout base e cliente API.

      ## O que criar

      1. Setup do projeto:
         ```bash
         npx create-next-app@latest frontend --typescript --tailwind --app --src-dir --eslint
         ```

      2. `frontend/src/lib/api.ts` — Cliente API:
         - Base URL configurável via env: NEXT_PUBLIC_API_URL (default: http://localhost:8000)
         - Funções genéricas: apiGet<T>, apiPost<T>, apiPut<T>, apiDelete<T>
         - Interceptor para incluir JWT token do localStorage no header Authorization
         - Tratamento de erros: 401 → redirect para /login, outros → throw com mensagem

      3. `frontend/src/app/layout.tsx` — Layout base:
         - Navbar com logo "TaskFlow", links (Dashboard, Tasks), botão Login/Logout
         - Footer simples com copyright
         - Wrapper para providers (AuthContext será adicionado na task-08)
         - Metadata: title="TaskFlow", description="Gerenciamento de tarefas"

      4. `frontend/src/app/page.tsx` — Home page:
         - Hero section com título "TaskFlow" e descrição
         - Botão CTA "Ir para Dashboard" (link para /dashboard)
         - Design limpo com Tailwind

      ## Importante
      - Usar App Router (não Pages Router)
      - TypeScript strict mode
      - Tailwind CSS para todos os estilos
      - Não instalar bibliotecas de UI extras (shadcn, MUI, etc) — usar Tailwind puro
    dependencies: []
    acceptance_criteria:
      - "Next.js rodando com npm run dev"
      - "Layout base com navbar e footer"
      - "Cliente API em lib/api.ts configurado"
      - "TypeScript strict mode ativo"
      - "Tailwind CSS funcionando"
    files_to_create:
      - "frontend/src/lib/api.ts"
      - "frontend/src/app/layout.tsx"
      - "frontend/src/app/page.tsx"

  # ============================================================
  # WAVE 2 — Dependem da Wave 1 (2 tasks em paralelo)
  # ============================================================

  - id: task-03-crud
    title: "Camada de Repositório CRUD"
    description: |
      Criar a camada de repositório com operações CRUD para Tasks e Users.

      ## O que criar

      1. `backend/src/taskflow/repositories.py` — Operações CRUD:

         class TaskRepository:
           - `create(db: Session, task: TaskCreate, owner_id: int) -> TaskModel`
           - `get_by_id(db: Session, task_id: int) -> TaskModel | None`
           - `list_all(db: Session, skip: int = 0, limit: int = 100) -> list[TaskModel]`
           - `list_by_owner(db: Session, owner_id: int) -> list[TaskModel]`
           - `update(db: Session, task_id: int, task: TaskUpdate) -> TaskModel | None`
           - `delete(db: Session, task_id: int) -> bool`

         class UserRepository:
           - `create(db: Session, user: UserCreate) -> UserModel` (usar passlib para hash da senha)
           - `get_by_id(db: Session, user_id: int) -> UserModel | None`
           - `get_by_username(db: Session, username: str) -> UserModel | None`
           - `verify_password(plain: str, hashed: str) -> bool`

      2. `backend/tests/test_repositories.py` — Testes:
         - Testar CRUD completo de Task (create, read, update, delete)
         - Testar criação de User com senha hasheada
         - Testar busca por username
         - Usar fixture com banco SQLite in-memory

      ## Importante
      - Leia os arquivos existentes (schemas.py, database.py, db_models.py) para usar os tipos corretos
      - Use os imports dos módulos já criados
    dependencies:
      - task-01-models
      - task-02-database
    acceptance_criteria:
      - "TaskRepository com 6 métodos CRUD"
      - "UserRepository com create, get_by_id, get_by_username, verify_password"
      - "Senhas hasheadas com passlib"
      - "Testes com SQLite in-memory passando"
    files_to_create:
      - "backend/src/taskflow/repositories.py"
      - "backend/tests/test_repositories.py"

  - id: task-04-auth
    title: "Autenticação JWT"
    description: |
      Implementar autenticação JWT com login e proteção de rotas.

      ## O que criar

      1. `backend/src/taskflow/auth.py` — Módulo de autenticação:
         - SECRET_KEY = os.getenv("SECRET_KEY", "dev-secret-key-change-in-production")
         - ALGORITHM = "HS256"
         - ACCESS_TOKEN_EXPIRE_MINUTES = 30
         - `create_access_token(data: dict, expires_delta: timedelta | None = None) -> str`
         - `decode_access_token(token: str) -> dict` (raise HTTPException 401 se inválido/expirado)
         - `get_current_user(token: str = Depends(oauth2_scheme), db: Session = Depends(get_db)) -> UserModel`
           - oauth2_scheme = OAuth2PasswordBearer(tokenUrl="auth/login")
           - Decodifica token, busca user no banco, retorna UserModel

      2. `backend/src/taskflow/auth_router.py` — Router FastAPI:
         - POST `/auth/register` — Cria user, retorna UserResponse
         - POST `/auth/login` — Recebe OAuth2PasswordRequestForm, verifica senha, retorna {"access_token": ..., "token_type": "bearer"}

      3. `backend/tests/test_auth.py` — Testes:
         - Testar criação de token e decodificação
         - Testar token expirado
         - Testar registro de usuário via API
         - Testar login com credenciais corretas e incorretas

      ## Importante
      - Leia os arquivos existentes para usar os imports corretos
      - Use passlib.context.CryptContext para hash de senhas
      - Use python-jose para JWT
    dependencies:
      - task-01-models
      - task-02-database
    acceptance_criteria:
      - "JWT token creation e validation funcionando"
      - "Endpoint de registro criando user"
      - "Endpoint de login retornando token"
      - "get_current_user extraindo user do token"
      - "Testes passando"
    files_to_create:
      - "backend/src/taskflow/auth.py"
      - "backend/src/taskflow/auth_router.py"
      - "backend/tests/test_auth.py"

  # ============================================================
  # WAVE 3 — Dependem da Wave 2 (2 tasks em paralelo)
  # ============================================================

  - id: task-05-api-endpoints
    title: "API Endpoints FastAPI"
    description: |
      Criar os endpoints REST da API e o app principal FastAPI.

      ## O que criar

      1. `backend/src/taskflow/task_router.py` — Router de Tasks:
         - GET `/tasks` — Lista todas as tasks (com paginação: skip, limit)
         - GET `/tasks/{task_id}` — Busca task por ID (404 se não existe)
         - POST `/tasks` — Cria task (requer autenticação, owner_id = current_user.id)
         - PUT `/tasks/{task_id}` — Atualiza task (requer autenticação, só owner pode atualizar)
         - DELETE `/tasks/{task_id}` — Deleta task (requer autenticação, só owner pode deletar)

      2. `backend/src/taskflow/app.py` — Aplicação FastAPI principal:
         - Criar FastAPI app com title="TaskFlow API", description, version="1.0.0"
         - Incluir auth_router com prefix="/auth" e tags=["auth"]
         - Incluir task_router com prefix="/tasks" e tags=["tasks"]
         - Adicionar CORS middleware (allow all origins para dev)
         - Adicionar evento startup que chama create_tables()
         - Adicionar endpoint GET `/` retornando {"message": "TaskFlow API", "version": "1.0.0", "docs": "/docs"}

      ## Importante
      - Leia TODOS os arquivos existentes (schemas, db_models, database, repositories, auth, auth_router)
      - Use os imports e tipos existentes
      - Use Depends(get_current_user) para rotas protegidas
      - Use Depends(get_db) para obter session
      - Adicionar CORSMiddleware para permitir requests do frontend
    dependencies:
      - task-03-crud
      - task-04-auth
    acceptance_criteria:
      - "5 endpoints de tasks (CRUD + list) funcionando"
      - "App FastAPI com routers incluídos"
      - "Rotas protegidas requerem autenticação"
      - "Documentação OpenAPI disponível em /docs"
    files_to_create:
      - "backend/src/taskflow/task_router.py"
      - "backend/src/taskflow/app.py"

  - id: task-08-auth-ui
    title: "Auth UI - Login/Register"
    description: |
      Criar as páginas de login e registro, AuthContext com JWT e wrapper de rotas protegidas.

      ## O que criar

      1. `frontend/src/lib/auth.tsx` — AuthContext:
         - AuthContext com React Context API
         - Estado: user (objeto com id, username, email), token (string), isAuthenticated (boolean), isLoading (boolean)
         - Funções: login(username, password), register(username, email, password), logout()
         - Persistência do token no localStorage
         - Auto-login ao carregar (verificar token existente)
         - Provider que wrapa toda a aplicação

      2. `frontend/src/app/login/page.tsx` — Página de Login:
         - Formulário com username e password
         - Botão de submit com loading state
         - Link "Não tem conta? Registre-se"
         - Redirect para /dashboard após login sucesso
         - Mensagem de erro para credenciais inválidas

      3. `frontend/src/app/register/page.tsx` — Página de Registro:
         - Formulário com username, email e password
         - Validação client-side (email formato, senha mínimo 8 chars)
         - Redirect para /login após registro sucesso
         - Mensagem de erro para username/email duplicado

      4. `frontend/src/components/ProtectedRoute.tsx` — Wrapper:
         - Verifica se user está autenticado via AuthContext
         - Se não: redirect para /login
         - Se loading: mostrar spinner/skeleton
         - Se sim: renderizar children

      ## Importante
      - Leia os arquivos existentes do frontend (layout.tsx, api.ts)
      - Use 'use client' nos componentes que usam hooks
      - Integrar com POST /auth/login (OAuth2 form) e POST /auth/register
      - Atualizar layout.tsx para wrapar com AuthProvider
    dependencies:
      - task-04-auth
      - task-07-nextjs-setup
    acceptance_criteria:
      - "Login funcional com JWT"
      - "Registro funcional"
      - "AuthContext gerenciando estado de autenticação"
      - "ProtectedRoute redirecionando usuários não autenticados"
      - "Integração com POST /auth/login e POST /auth/register"
    files_to_create:
      - "frontend/src/lib/auth.tsx"
      - "frontend/src/app/login/page.tsx"
      - "frontend/src/app/register/page.tsx"
      - "frontend/src/components/ProtectedRoute.tsx"

  # ============================================================
  # WAVE 4 — Dependem da Wave 3 (2 tasks em paralelo)
  # ============================================================

  - id: task-06-integration-tests
    title: "Testes de Integração End-to-End"
    description: |
      Criar testes de integração completos que testam o fluxo inteiro da API.

      ## O que criar

      1. `backend/tests/conftest.py` — Fixtures compartilhadas:
         - Fixture `test_db` que cria banco SQLite in-memory e sessão
         - Fixture `client` que cria TestClient do FastAPI com override de get_db
         - Fixture `auth_headers` que registra user, faz login e retorna headers com token

      2. `backend/tests/test_integration.py` — Testes end-to-end:
         - test_health_check: GET / retorna 200 com message
         - test_full_task_lifecycle:
           1. Registrar usuário (POST /auth/register)
           2. Fazer login (POST /auth/login)
           3. Criar task (POST /tasks com token)
           4. Listar tasks (GET /tasks)
           5. Buscar task por ID (GET /tasks/{id})
           6. Atualizar task (PUT /tasks/{id})
           7. Deletar task (DELETE /tasks/{id})
           8. Verificar que task foi deletada (GET /tasks/{id} = 404)
         - test_unauthorized_access: POST /tasks sem token retorna 401
         - test_create_multiple_tasks: Criar 3 tasks e verificar listagem
         - test_update_task_status: Criar task, atualizar status para "done"
         - test_only_owner_can_modify: User A cria task, User B tenta deletar = 403

      ## Importante
      - Leia TODOS os arquivos existentes para entender a estrutura completa
      - Use httpx.AsyncClient ou TestClient do FastAPI
      - Cada teste deve ser independente (banco limpo)
    dependencies:
      - task-05-api-endpoints
    acceptance_criteria:
      - "conftest.py com fixtures reutilizáveis"
      - "Testes cobrindo o ciclo completo da API"
      - "Teste de autenticação (401 sem token)"
      - "Teste de autorização (403 para non-owner)"
      - "Todos os testes passando com pytest"
    files_to_create:
      - "backend/tests/conftest.py"
      - "backend/tests/test_integration.py"

  - id: task-09-task-management-ui
    title: "Task Management UI"
    description: |
      Criar a interface de gerenciamento de tarefas: listagem com filtros, formulários de criação/edição, exclusão e badges de status.

      ## O que criar

      1. `frontend/src/app/tasks/page.tsx` — Lista de Tasks:
         - Listagem de tasks em cards
         - Filtros por status (todo, in_progress, done) e prioridade (low, medium, high)
         - Botão "Nova Task" (link para /tasks/new)
         - Loading state (skeleton) e empty state ("Nenhuma task encontrada")
         - Rota protegida (usar ProtectedRoute)

      2. `frontend/src/app/tasks/new/page.tsx` — Criar Task:
         - Formulário com: title (input text), description (textarea), priority (select: low/medium/high)
         - Validação: title obrigatório, min 1 char
         - Submit: POST /tasks com auth headers
         - Sucesso: redirect para /tasks
         - Erro: mostrar mensagem

      3. `frontend/src/app/tasks/[id]/edit/page.tsx` — Editar Task:
         - Carregar dados da task (GET /tasks/{id})
         - Formulário preenchido com dados atuais
         - Campos: title, description, priority, status (select: todo/in_progress/done)
         - Submit: PUT /tasks/{id} com auth headers
         - Botões: Salvar e Cancelar (volta para /tasks)

      4. `frontend/src/components/TaskCard.tsx` — Card de Task:
         - Exibir: title, description (truncada em 100 chars), priority badge, status badge
         - Botões: Edit (link para /tasks/{id}/edit), Delete
         - Delete: confirm() → DELETE /tasks/{id} → remover da lista

      5. `frontend/src/components/StatusBadge.tsx` — Badge de Status/Prioridade:
         - Status: todo (bg-gray-100 text-gray-800), in_progress (bg-yellow-100 text-yellow-800), done (bg-green-100 text-green-800)
         - Priority: low (bg-blue-100 text-blue-800), medium (bg-orange-100 text-orange-800), high (bg-red-100 text-red-800)

      ## Importante
      - Leia todos os arquivos frontend existentes (layout, api.ts, auth.tsx)
      - Todas as páginas de tasks são protegidas (requerem auth)
      - Usar o cliente API de lib/api.ts para requests
      - Usar StatusBadge para consistência visual
    dependencies:
      - task-05-api-endpoints
      - task-07-nextjs-setup
    acceptance_criteria:
      - "Lista de tasks com filtros por status e prioridade"
      - "Criação de task funcional"
      - "Edição de task funcional"
      - "Exclusão com confirmação"
      - "Status badges com cores"
      - "Integração com API de tasks"
    files_to_create:
      - "frontend/src/app/tasks/page.tsx"
      - "frontend/src/app/tasks/new/page.tsx"
      - "frontend/src/app/tasks/[id]/edit/page.tsx"
      - "frontend/src/components/TaskCard.tsx"
      - "frontend/src/components/StatusBadge.tsx"

  # ============================================================
  # WAVE 5 — Final (1 task)
  # ============================================================

  - id: task-10-dashboard
    title: "Dashboard + Integração Final"
    description: |
      Criar o dashboard com estatísticas, overview de tasks e verificação final de integração.

      ## O que criar

      1. `frontend/src/app/dashboard/page.tsx` — Dashboard:
         - Stats cards em grid (2x2 ou 4 colunas):
           - Total de tasks (número grande)
           - Tasks por status: X todo, Y in_progress, Z done
           - Tasks por prioridade: X low, Y medium, Z high
           - Percentual concluído (done/total)
         - Overview: tabela/lista das últimas 5 tasks criadas
         - Botão rápido "Nova Task" (link para /tasks/new)
         - Gráfico simples de barras CSS (div com width proporcional) mostrando distribuição por status
         - Rota protegida

      2. Integração final — verificar:
         - Auth flow completo: register → login → dashboard → tasks → CRUD → logout
         - Navbar atualiza com nome do user logado
         - Logout limpa token e redireciona
         - Páginas protegidas redirecionam para login
         - API retorna erros tratados (404, 401, 403)

      3. Checklist de teste E2E manual:
         - [ ] Registro de novo usuário
         - [ ] Login com credenciais válidas
         - [ ] Dashboard mostra estatísticas corretas
         - [ ] Criar nova task via formulário
         - [ ] Task aparece na lista e no dashboard
         - [ ] Editar task (mudar título e status)
         - [ ] Dashboard atualiza estatísticas
         - [ ] Deletar task com confirmação
         - [ ] Logout e redirect para login
         - [ ] Tentar acessar /dashboard sem token → redirect login

      ## Importante
      - Leia TODOS os arquivos frontend existentes
      - O dashboard deve buscar dados via API (GET /tasks)
      - Calcular stats no client-side a partir dos dados retornados
      - Design responsivo com Tailwind (funcionar em mobile)
    dependencies:
      - task-08-auth-ui
      - task-09-task-management-ui
    acceptance_criteria:
      - "Dashboard com stats cards funcionando"
      - "Gráfico de barras CSS mostrando distribuição"
      - "Overview das últimas tasks"
      - "Auth flow completo funcionando"
      - "E2E manual checklist passando"
    files_to_create:
      - "frontend/src/app/dashboard/page.tsx"
